# Local dev only. Never used in production.

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: wandr_postgres
    environment:
      POSTGRES_USER: wandr
      POSTGRES_PASSWORD: wandr
      POSTGRES_DB: wandr
    ports:
      - "5432:5432"
    volumes:
      - wandr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wandr -d wandr"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: wandr_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - wandr_qdrant_data:/qdrant/storage

volumes:
  wandr_postgres_data:
  wandr_qdrant_data:
